<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f5f5f5; 
        font-family: Arial, sans-serif;
    }

    .content-box {
        background: white;
        padding: 30px;
        border-radius: 8px;
        margin-top: 40px;
        max-width: 780px;
        box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .navbar {
        background-color: #f8f9fa;
    }

    .contact-icon {
        width: 70px;
        display: block;
        margin: 0 auto 10px auto;
        opacity: 0.9;
    }

    .info-box {
        background: #f1f1f1;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
    }
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light">
<div class="container-fluid">

    <a class="navbar-brand" href="index.html">Numerology</a>

    <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="generate.html">Generate</a></li>
        <li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
    </ul>

</div>
</nav>

<div class="container d-flex justify-content-center">
    <div class="content-box w-100">

        <div class="text-center mb-3">
            <img src="https://i.imgur.com/SNv7u4C.png" class="contact-icon">
            <h2>Contact Us</h2>
            <p style="color:#444">Chúng tôi luôn sẵn sàng hỗ trợ bạn về thần số học.</p>
        </div>

        <div class="row mb-4 text-center">
            <div class="col-md-6">
                <div class="info-box">
                    <strong>Email:</strong><br>
                    support@numerology.com
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-box">
                    <strong>Phone:</strong><br>
                    +84 123 456 789
                </div>
            </div>
        </div>

        <form action="https://formspree.io/f/mojkkawv" method="POST">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="4" required></textarea>
            </div>

            <div class="text-end">
                <button class="btn btn-primary px-4">Send</button>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
