<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #1b1b2f, #162447, #0f3460);
        background-size: 300% 300%;
        animation: gradientMove 12s ease infinite;
        font-family: "Poppins", Arial, sans-serif;
        color: #fff;
        margin: 0;
        padding: 0;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .content-box {
        background: rgba(255, 255, 255, 0.10);
        padding: 35px;
        border-radius: 16px;
        margin-top: 50px;
        max-width: 780px;
        width: 100%;
        box-shadow: 0 0 18px rgba(0,0,0,0.25);
        backdrop-filter: blur(12px);
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .info-box {
        background: rgba(255, 255, 255, 0.15);
        padding: 15px;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        backdrop-filter: blur(5px);
    }

    .navbar {
        background: rgba(255, 255, 255, 0.12) !important;
        backdrop-filter: blur(10px);
    }

    .nav-link {
        color: #fff !important;
        font-weight: 500;
    }

    .nav-link.active, 
    .nav-link:hover {
        color: #00eaff !important;
    }

    input, textarea {
        background: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255,255,255,0.25) !important;
        color: #fff !important;
    }

    input::placeholder, textarea::placeholder {
        color: #ccc;
    }

    .btn-primary {
        background: #00eaff;
        border: none;
        color: #000;
        font-weight: 600;
    }

    .btn-primary:hover {
        opacity: 0.85;
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light">
<div class="container-fluid">
    <a class="navbar-brand text-white fw-bold" href="index.html">Numerology</a>

    <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="generate.html">Generate</a></li>
        <li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
    </ul>
</div>
</nav>

<div class="container d-flex justify-content-center">
    <div class="content-box">

        <div class="text-center mb-4">
            <h2 class="fw-bold">Liên hệ với chúng tôi</h2>
            <p style="color:#e3e3e3">Gửi tin nhắn nếu bạn cần hỗ trợ hoặc có câu hỏi về thần số học.</p>
        </div>

        <div class="row mb-4 text-center">
            <div class="col-md-6 mb-2">
                <div class="info-box">
                    <strong>Email:</strong><br>
                    support@numerology.com
                </div>
            </div>

            <div class="col-md-6 mb-2">
                <div class="info-box">
                    <strong>Phone:</strong><br>
                    +84 123 456 789
                </div>
            </div>
        </div>

        <!-- FORM -->
        <form action="https://formspree.io/f/mojkkawv" method="POST">

            <div class="mb-3">
                <label class="form-label text-white">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Nhập tên của bạn" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Nhập email" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Message</label>
                <textarea name="message" class="form-control" rows="4" placeholder="Nội dung cần hỗ trợ" required></textarea>
            </div>

            <div class="text-end">
                <button class="btn btn-primary px-4 py-2">Send</button>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
