<!DOCTYPE html>
<html>
<head>
<title>Generate Numerology</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0d0d0f, #1a1a2e);
    color: #fff;
    font-family: 'Poppins', sans-serif;
}
.form-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    margin-top: 50px;
}
label { margin-top: 10px; }
.btn-custom {
    background: linear-gradient(45deg, #00eaff, #9a4dff);
    border: none;
    padding: 12px;
    font-weight: 600;
    border-radius: 10px;
    width: 100%;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <div class="form-box">
        <h2>Tra cứu Thần số học</h2>

        <form id="numerologyForm">

            <label>Họ và tên</label>
            <input id="name" type="text" class="form-control" placeholder="VD: Nguyễn Văn A">

            <label>Ngày sinh</label>
            <input id="birthdate" type="date" class="form-control">

            <button class="btn-custom" type="submit">Xem kết quả</button>
        </form>
    </div>
</div>

<script src="generate.js"></script>
</body>
</html>
