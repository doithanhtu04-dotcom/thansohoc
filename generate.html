<!DOCTYPE html>
<html>
<head>
<title>Numerology Generate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0d0d0f, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
    }
    .glass-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 25px;
        border-radius: 18px;
        margin-top: 50px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="glass-card mx-auto col-md-6">
        <h3 class="text-center mb-3">Nhập thông tin của bạn</h3>

        <form id="numerologyForm">
            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" id="name" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" id="birthdate" class="form-control" />
            </div>

            <button class="btn btn-light w-100">Xem kết quả</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
