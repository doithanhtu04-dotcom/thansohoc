<!DOCTYPE html>
<html>
<head>
<title>Numerology Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0d0d0f, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
    }
    .navbar {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
    }
    .navbar-brand { color: #fff; font-weight: 600; }
    .nav-link { color: #ccc !important; }
    .nav-link.active, .nav-link:hover { color: #00eaff !important; }

    .glass-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 25px;
        border-radius: 18px;
        margin-bottom: 20px;
    }
    #resultNumber {
        text-align: center;
        font-size: 46px;
        font-weight: 700;
        background: linear-gradient(90deg,#9a4dff,#00eaff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">
    <a class="navbar-brand" href="index.html">Numerology</a>
    <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="generate.html">Generate</a></li>
        <li class="nav-item"><a class="nav-link active" href="result.html">Result</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    </ul>
</div>
</nav>

<div class="container mt-4">

    <h2 class="text-center">Kết quả thần số học</h2>
    <div id="resultNumber"></div>

    <div class="glass-card">
        <h4>Tính cách nổi bật</h4>
        <p id="personality"></p>
    </div>

    <div class="glass-card">
        <h4>Ngành nghề phù hợp</h4>
        <ul id="career"></ul>
    </div>

    <div class="glass-card">
        <h4>Chu kỳ cuộc đời</h4>
        <p id="cycle"></p>
    </div>

    <a href="generate.html" class="btn btn-light mt-3">Thử lại</a>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
