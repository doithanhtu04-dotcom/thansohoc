<!DOCTYPE html>
<html>
<head>

<title>Numerology Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0d0d0f, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        padding-bottom: 50px;
        font-family: 'Poppins', sans-serif;
    }

    .navbar {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
    }

    .brand-title {
        color: #fff;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .nav-link {
        color: #dcdcdc !important;
        margin-right: 10px;
    }

    .nav-link.active,
    .nav-link:hover {
        color: #00eaff !important;
    }

    h2 {
        background: linear-gradient(90deg, #00eaff, #9a4dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 25px;
        text-align: center;
    }

    #resultNumber {
        background: linear-gradient(90deg, #9a4dff, #00eaff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 48px;
        text-align: center;
        font-weight: 700;
        margin-bottom: 20px;
    }

    .glass-card {
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 8px 28px rgba(0,0,0,0.3);
        backdrop-filter: blur(18px);
        animation: fadeIn 0.8s ease;
        margin-bottom: 25px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-custom {
        width: 200px;
        background: linear-gradient(45deg, #00eaff, #9a4dff);
        border: none;
        color: black;
        font-weight: 600;
        padding: 12px;
        border-radius: 12px;
        display: block;
        margin: 20px auto 0;
        transition: 0.2s;
        text-align: center;
    }

    .btn-custom:hover {
        opacity: 0.85;
        transform: scale(1.02);
    }
</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg">
<div class="container-fluid">

<a class="navbar-brand brand-title" href="index.html">Numerology</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="generate.html">Generate</a></li>
<li class="nav-item"><a class="nav-link active" href="result.html">Result</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>

</div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

<h2>Kết quả thần số học</h2>

<h1 id="resultNumber"></h1>

<div class="glass-card">
<h4>Phân tích tính cách</h4>
<p id="personality"></p>
</div>

<div class="glass-card">
<h4>Ngành nghề phù hợp</h4>
<ul id="career"></ul>
</div>

<div class="glass-card">
<h4>Chu kỳ cuộc đời</h4>
<p id="cycle"></p>
</div>

<a href="generate.html" class="btn-custom">Thử lại</a>

</div>

<script>
let number = localStorage.getItem("lifePath");

document.getElementById("resultNumber").innerHTML = "Số chủ đạo: " + number;

let personality = {
1:"Người độc lập, có tố chất lãnh đạo.",
2:"Người hòa đồng, giỏi hợp tác.",
3:"Người sáng tạo, thích giao tiếp.",
4:"Người chăm chỉ, kỷ luật.",
5:"Người yêu tự do, thích khám phá.",
6:"Người trách nhiệm, quan tâm gia đình.",
7:"Người thích học hỏi và nghiên cứu.",
8:"Người có tư duy kinh doanh.",
9:"Người nhân ái, thích giúp đỡ cộng đồng."
};

document.getElementById("personality").innerHTML = personality[number];

let careers = {
1:["Quản lý","Doanh nhân","Leader","Startup"],
2:["Tư vấn","Nhân sự","Tâm lý","Giáo viên"],
3:["Marketing","Truyền thông","MC","Content Creator"],
4:["Kỹ sư","Kế toán","Lập trình","Kiến trúc"],
5:["Du lịch","Bán hàng","Event","Hướng dẫn viên"],
6:["Giáo dục","Y tế","Chăm sóc khách hàng","Xã hội"],
7:["Nghiên cứu","Giảng viên","Phân tích dữ liệu","IT"],
8:["Tài chính","Đầu tư","Kinh doanh","Quản lý"],
9:["Từ thiện","Nghệ thuật","Giáo dục","Tâm lý"]
};

let list = careers[number];
let html = "";

list.forEach(job => html += "<li>"+ job +"</li>");

document.getElementById("career").innerHTML = html;

document.getElementById("cycle").innerHTML =
`Giai đoạn 1: Học hỏi (0–27 tuổi) <br>
 Giai đoạn 2: Phát triển (28–54 tuổi) <br>
 Giai đoạn 3: Thành tựu (55+ tuổi)`;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
