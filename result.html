<!DOCTYPE html>
<html>
<head>

<title>Numerology Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #1b1b2f, #162447, #0f3460);
        background-size: 300% 300%;
        animation: gradientMove 12s ease infinite;
        font-family: "Poppins", Arial, sans-serif;
        color: #fff;
        margin: 0;
        padding: 0;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .navbar {
        background: rgba(255, 255, 255, 0.12) !important;
        backdrop-filter: blur(10px);
    }

    .navbar-brand,
    .nav-link {
        color: #fff !important;
        font-weight: 500;
    }

    .nav-link:hover,
    .nav-link.active {
        color: #00eaff !important;
    }

    .result-box {
        background: rgba(255, 255, 255, 0.10);
        padding: 30px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 18px rgba(0,0,0,0.25);
        animation: fadeIn 0.6s ease;
    }

    .card {
        background: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255,255,255,0.2) !important;
        color: #fff;
        backdrop-filter: blur(8px);
    }

    .btn-primary {
        background: #00eaff;
        border: none;
        color: #000;
        font-weight: 600;
    }

    .btn-primary:hover {
        opacity: 0.85;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">

    <a class="navbar-brand fw-bold" href="index.html">Numerology</a>

    <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="generate.html">Generate</a></li>
        <li class="nav-item"><a class="nav-link active" href="result.html">Result</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    </ul>

</div>
</nav>

<div class="container mt-5 d-flex justify-content-center">
    <div class="result-box w-100" style="max-width: 800px;">

        <h2 class="text-center fw-bold">Kết quả thần số học</h2>

        <h1 id="resultNumber" class="text-center mt-3" style="font-size:48px; font-weight:700; color:#00eaff;"></h1>

        <div class="card p-3 mt-4">
            <h4 class="fw-bold">Phân tích tính cách</h4>
            <p id="personality"></p>
        </div>

        <div class="card p-3 mt-3">
            <h4 class="fw-bold">Ngành nghề phù hợp</h4>
            <ul id="career"></ul>
        </div>

        <div class="card p-3 mt-3">
            <h4 class="fw-bold">Chu kỳ cuộc đời</h4>
            <p id="cycle"></p>
        </div>

        <div class="text-center">
            <a href="generate.html" class="btn btn-primary mt-4 px-4 py-2">Thử lại</a>
        </div>

    </div>
</div>

<script>

let number = localStorage.getItem("lifePath");

document.getElementById("resultNumber").innerHTML = "Số chủ đạo: " + number;

let personality = {
1:"Người độc lập, có tố chất lãnh đạo.",
2:"Người hòa đồng, giỏi hợp tác.",
3:"Người sáng tạo, thích giao tiếp.",
4:"Người chăm chỉ, kỷ luật.",
5:"Người yêu tự do, thích khám phá.",
6:"Người trách nhiệm, quan tâm gia đình.",
7:"Người thích học hỏi và nghiên cứu.",
8:"Người có tư duy kinh doanh.",
9:"Người nhân ái, thích giúp đỡ cộng đồng."
};

document.getElementById("personality").innerHTML = personality[number];

let careers = {
1:["Quản lý","Doanh nhân","Leader","Startup"],
2:["Tư vấn","Nhân sự","Tâm lý","Giáo viên"],
3:["Marketing","Truyền thông","MC","Content Creator"],
4:["Kỹ sư","Kế toán","Lập trình","Kiến trúc"],
5:["Du lịch","Bán hàng","Event","Hướng dẫn viên"],
6:["Giáo dục","Y tế","Chăm sóc khách hàng","Xã hội"],
7:["Nghiên cứu","Giảng viên","Phân tích dữ liệu","IT"],
8:["Tài chính","Đầu tư","Kinh doanh","Quản lý"],
9:["Từ thiện","Nghệ thuật","Giáo dục","Tâm lý"]
};

let list = careers[number];
let html = "";

list.forEach(function(job){
    html += "<li>" + job + "</li>";
});

document.getElementById("career").innerHTML = html;

document.getElementById("cycle").innerHTML =
"Giai đoạn 1: Học hỏi (0-27 tuổi) <br>" +
"Giai đoạn 2: Phát triển (28-54 tuổi) <br>" +
"Giai đoạn 3: Thành tựu (55+ tuổi)";

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
