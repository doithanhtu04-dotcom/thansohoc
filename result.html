<!DOCTYPE html>
<html>
<head>
<title>Numerology Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url('https://i.imgur.com/QK4sW1F.jpeg') center/cover no-repeat fixed;
    color: #fff;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
}

.overlay {
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.55);
    min-height: 100vh;
    padding-bottom: 50px;
}


.stat-box {
    background: rgba(255,255,255,0.1);
    padding: 25px 10px;
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    margin-bottom: 20px;
}

.stat-box h5 {
    font-size: 16px;
    color: #ddd;
}

.stat-number {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff52c0, #8f3dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.section-card {
    padding: 25px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    backdrop-filter: blur(18px);
    margin-bottom: 30px;
}


.btn-purple {
    width: 100%;
    background: linear-gradient(90deg, #c024ff, #7a39ff);
    padding: 15px;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
}
</style>
</head>

<body>
<div class="overlay">


<div class="container mt-4">
    <div class="row text-center">
        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Linh hồn</h5>
                <div class="stat-number" id="soulNum">–</div>
            </div>
        </div>

        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Sứ mệnh</h5>
                <div class="stat-number" id="destinyNum">–</div>
            </div>
        </div>

        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Thái độ</h5>
                <div class="stat-number" id="attitudeNum">–</div>
            </div>
        </div>

        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Nhân cách</h5>
                <div class="stat-number" id="personalityNum">–</div>
            </div>
        </div>

        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Trưởng thành</h5>
                <div class="stat-number" id="maturityNum">–</div>
            </div>
        </div>

        <div class="col-6 col-md-2">
            <div class="stat-box">
                <h5>Tư duy</h5>
                <div class="stat-number" id="thinkingNum">–</div>
            </div>
        </div>
    </div>
</div>


<div class="container mt-4">
    <div class="section-card">
        <h4 class="mb-3">Chu kỳ vận số của bạn</h4>
        <canvas id="lifeChart" height="100"></canvas>
    </div>
</div>


<div class="container">
    <div class="section-card">
        <h4 class="mb-3">Tính cách nổi trội</h4>
        <p id="highlightTraits"></p>
    </div>
</div>


<div class="container mb-5">
    <button class="btn-purple">Xem chi tiết luận giải</button>
</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let lifePath = localStorage.getItem("lifePath");
let soul      = localStorage.getItem("soul");
let destiny   = localStorage.getItem("destiny");
let attitude  = localStorage.getItem("attitude");
let persona   = localStorage.getItem("persona");
let maturity  = localStorage.getItem("maturity");
let thinking  = localStorage.getItem("thinking");


document.getElementById("soulNum").innerText       = soul ?? "–";
document.getElementById("destinyNum").innerText    = destiny ?? "–";
document.getElementById("attitudeNum").innerText   = attitude ?? "–";
document.getElementById("personalityNum").innerText= persona ?? "–";
document.getElementById("maturityNum").innerText   = maturity ?? "–";
document.getElementById("thinkingNum").innerText   = thinking ?? "–";

let personalityData = {
    1: "- Mạnh mẽ, quyết đoán, có tố chất lãnh đạo.",
    2: "- Nhạy cảm, tinh tế, giỏi thấu hiểu.",
    3: "- Sáng tạo, lạc quan, truyền cảm hứng.",
    4: "- Kiên trì, logic, thực tế.",
    5: "- Tự do, phiêu lưu, nhiều năng lượng.",
    6: "- Trách nhiệm, yêu thương, chăm sóc.",
    7: "- Sâu sắc, thích nghiên cứu.",
    8: "- Tham vọng, kiểm soát tài chính tốt.",
    9: "- Nhân văn, sống vì cộng đồng."
};

document.getElementById("highlightTraits").innerHTML = personalityData[lifePath];


new Chart(document.getElementById("lifeChart"), {
    type: 'line',
    data: {
        labels: ["2021","2022","2023","2024","2025","2026","2027","2028","2029","2030","2031"],
        datasets: [{
            data: [3,4,5,6,7,8,9,1,2,3,4],
            borderWidth: 3,
            tension: 0.4
        }]
    },
    options: { plugins: { legend: { display: false }}}
});
</script>

</body>
</html>
